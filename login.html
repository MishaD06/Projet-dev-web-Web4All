<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - StageLab</title>
    <meta name="description" content="Connectez-vous à StageLab pour accéder aux offres de stage.">
    <meta name="keywords" content="connexion StageLab, login étudiant, se connecter">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">Stage<span>Lab</span></a>
            </div>
            <button class="burger" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" aria-label="Navigation principale">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
                    <li><a href="offers.html"><i class="fas fa-briefcase"></i> Offres</a></li>
                    <li><a href="companies.html"><i class="fas fa-building"></i> Entreprises</a></li>
                    <li><a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Connexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card" style="max-width: 440px; margin: 1rem auto;">
            <div class="card-header">
                <h2><i class="fas fa-sign-in-alt" style="margin-right: 0.5rem; color: #8b5cf6;"></i> Connexion</h2>
            </div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email <span style="color: #ef4444;">*</span></label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="exemple@cesi.fr" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe <span style="color: #ef4444;">*</span></label>
                    <input type="password" class="form-control" id="password" name="mot_de_passe" placeholder="••••••••" required minlength="8" autocomplete="current-password">
                </div>
                <button type="submit" class="btn" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
                <p style="margin-top: 1.2rem; text-align: center; font-size: 0.9rem;">
                    <a href="#" style="color: #8b5cf6;">Mot de passe oublié ?</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 StageLab - Tous droits réservés - <a href="mentions.html">Mentions légales</a></p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            if (!email || !pwd) { alert('Veuillez remplir tous les champs.'); return; }
            // Simulation
            if (email.includes('admin')) window.location.href = 'dashboard-admin.html';
            else if (email.includes('pilote')) window.location.href = 'dashboard-pilote.html';
            else window.location.href = 'dashboard-student.html';
        });
    </script>
</body>
</html>
