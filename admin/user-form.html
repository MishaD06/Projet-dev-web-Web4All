<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire utilisateur - StageLab</title>
    <meta name="description" content="Créer ou modifier un compte utilisateur sur StageLab.">
    <meta name="keywords" content="créer utilisateur, modifier compte, administration">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html">Stage<span>Lab</span></a>
            </div>
            <button class="burger" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" aria-label="Navigation principale">
                <ul>
                    <li><a href="../dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="../offers.html"><i class="fas fa-briefcase"></i> Offres</a></li>
                    <li><a href="../companies.html"><i class="fas fa-building"></i> Entreprises</a></li>
                    <li><a href="users.html" class="active"><i class="fas fa-users-cog"></i> Utilisateurs</a></li>
                    <li><a href="../profile.html"><i class="fas fa-user-cog"></i> Profil</a></li>
                    <li><a href="../login.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card" style="max-width: 620px; margin: 0 auto;">
            <div class="card-header">
                <h2><i class="fas fa-user-edit" style="color: #8b5cf6;"></i> Ajouter / Modifier un utilisateur</h2>
            </div>
            <form id="userForm" novalidate>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="nom">Nom <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="form-control" id="nom" name="nom" value="Martin" required maxlength="50" placeholder="Nom de famille">
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="form-control" id="prenom" name="prenom" value="Thomas" required maxlength="50" placeholder="Prénom">
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email <span style="color: #ef4444;">*</span></label>
                    <input type="email" class="form-control" id="email" name="email" value="thomas.martin@cesi.fr" required placeholder="prenom.nom@cesi.fr">
                </div>
                <div class="form-group">
                    <label for="role">Rôle <span style="color: #ef4444;">*</span></label>
                    <select class="form-control" id="role" name="role" required>
                        <option value="">Sélectionner un rôle</option>
                        <option value="etudiant" selected>Étudiant</option>
                        <option value="pilote">Pilote</option>
                        <option value="admin">Administrateur</option>
                    </select>
                </div>
                <div class="form-group" id="piloteGroup" style="display: none;">
                    <label for="pilote">Pilote responsable</label>
                    <select class="form-control" id="pilote" name="pilote_id">
                        <option value="">Aucun</option>
                        <option value="1">Sophie Dubois</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe <span style="color: #ef4444;" id="pwdRequired">*</span></label>
                    <input type="password" class="form-control" id="password" name="mot_de_passe" placeholder="Laisser vide pour ne pas modifier" minlength="8" autocomplete="new-password">
                    <small style="color: #94a3b8; font-size: 0.8rem; margin-top: 0.3rem; display: block;">Minimum 8 caractères</small>
                </div>
                <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.5rem;">
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Enregistrer</button>
                    <a href="users.html" class="btn btn-outline"><i class="fas fa-times"></i> Annuler</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 StageLab - Tous droits réservés - <a href="../mentions.html">Mentions légales</a></p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        // Afficher champ pilote si le rôle est étudiant
        document.getElementById('role').addEventListener('change', function() {
            const piloteGroup = document.getElementById('piloteGroup');
            piloteGroup.style.display = this.value === 'etudiant' ? 'block' : 'none';
        });

        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nom').value.trim();
            const prenom = document.getElementById('prenom').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;
            const pwd = document.getElementById('password').value;

            if (!nom || !prenom || !email || !role) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Veuillez entrer une adresse email valide.');
                return;
            }
            if (pwd && pwd.length < 8) {
                alert('Le mot de passe doit comporter au moins 8 caractères.');
                return;
            }
            alert('Utilisateur enregistré avec succès !');
            window.location.href = 'users.html';
        });
    </script>
</body>
</html>
