<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire entreprise - StageLab</title>
    <meta name="description" content="Créer ou modifier une fiche entreprise sur StageLab.">
    <meta name="keywords" content="créer entreprise, modifier entreprise, administration">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html">Stage<span>Lab</span></a>
            </div>
            <button class="burger" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" aria-label="Navigation principale">
                <ul>
                    <li><a href="../dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="../offers.html"><i class="fas fa-briefcase"></i> Offres</a></li>
                    <li><a href="../companies.html"><i class="fas fa-building"></i> Entreprises</a></li>
                    <li><a href="users.html"><i class="fas fa-users-cog"></i> Utilisateurs</a></li>
                    <li><a href="../profile.html"><i class="fas fa-user-cog"></i> Profil</a></li>
                    <li><a href="../login.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card" style="max-width: 620px; margin: 0 auto;">
            <div class="card-header">
                <h2><i class="fas fa-building" style="color: #8b5cf6;"></i> Ajouter / Modifier une entreprise</h2>
            </div>
            <form id="companyForm" novalidate>
                <div class="form-group">
                    <label for="nom">Nom <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-control" id="nom" name="nom" value="TechCorp" required maxlength="100" placeholder="Nom de l'entreprise">
                </div>
                <div class="form-group">
                    <label for="description">Description <span style="color: #ef4444;">*</span></label>
                    <textarea class="form-control" id="description" name="description" rows="4" required placeholder="Présentez l'activité de l'entreprise...">Entreprise innovante dans le développement logiciel.</textarea>
                </div>
                <div class="form-group">
                    <label for="email">Email de contact <span style="color: #ef4444;">*</span></label>
                    <input type="email" class="form-control" id="email" name="email_contact" value="contact@techcorp.fr" required placeholder="contact@entreprise.fr">
                </div>
                <div class="form-group">
                    <label for="telephone">Téléphone <span style="color: #ef4444;">*</span></label>
                    <input type="tel" class="form-control" id="telephone" name="telephone_contact" value="01 23 45 67 89" required placeholder="01 23 45 67 89" pattern="[0-9 +\-\.]{8,20}">
                </div>
                <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.5rem;">
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Enregistrer</button>
                    <a href="../companies.html" class="btn btn-outline"><i class="fas fa-times"></i> Annuler</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 StageLab - Tous droits réservés - <a href="../mentions.html">Mentions légales</a></p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('companyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nom').value.trim();
            const description = document.getElementById('description').value.trim();
            const email = document.getElementById('email').value.trim();
            const tel = document.getElementById('telephone').value.trim();

            if (!nom || !description || !email || !tel) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Veuillez entrer une adresse email valide.');
                return;
            }
            alert('Entreprise enregistrée avec succès !');
            window.location.href = '../companies.html';
        });
    </script>
</body>
</html>
