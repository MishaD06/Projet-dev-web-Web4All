<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire offre - StageLab</title>
    <meta name="description" content="Créer ou modifier une offre de stage sur StageLab.">
    <meta name="keywords" content="créer offre stage, modifier offre, administration">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html">Stage<span>Lab</span></a>
            </div>
            <button class="burger" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" aria-label="Navigation principale">
                <ul>
                    <li><a href="../dashboard-admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="../offers.html"><i class="fas fa-briefcase"></i> Offres</a></li>
                    <li><a href="../companies.html"><i class="fas fa-building"></i> Entreprises</a></li>
                    <li><a href="users.html"><i class="fas fa-users-cog"></i> Utilisateurs</a></li>
                    <li><a href="../profile.html"><i class="fas fa-user-cog"></i> Profil</a></li>
                    <li><a href="../login.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="card" style="max-width: 620px; margin: 0 auto;">
            <div class="card-header">
                <h2><i class="fas fa-briefcase" style="color: #8b5cf6;"></i> Ajouter / Modifier une offre</h2>
            </div>
            <form id="offerForm" novalidate>
                <div class="form-group">
                    <label for="titre">Titre <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-control" id="titre" name="titre" value="Développeur Full Stack" required maxlength="150" placeholder="Intitulé du poste">
                </div>
                <div class="form-group">
                    <label for="entreprise">Entreprise <span style="color: #ef4444;">*</span></label>
                    <select class="form-control" id="entreprise" name="entreprise_id" required>
                        <option value="">Sélectionner une entreprise</option>
                        <option value="1" selected>TechCorp</option>
                        <option value="2">MarketPlus</option>
                        <option value="3">DataSys</option>
                        <option value="4">SoftDev</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description <span style="color: #ef4444;">*</span></label>
                    <textarea class="form-control" id="description" name="description" rows="5" required placeholder="Décrivez les missions, l'environnement, les objectifs...">Stage de 6 mois, développement d'applications web.</textarea>
                </div>
                <div class="form-group">
                    <label for="competences">Compétences <span style="color: #ef4444;">*</span></label>
                    <input type="text" class="form-control" id="competences" name="competences" value="PHP, JavaScript, MySQL" required placeholder="Ex : PHP, JavaScript, MySQL (séparées par des virgules)">
                    <small style="color: #94a3b8; font-size: 0.8rem; margin-top: 0.3rem; display: block;">Séparez les compétences par des virgules</small>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="remuneration">Rémunération (€/mois) <span style="color: #ef4444;">*</span></label>
                        <input type="number" class="form-control" id="remuneration" name="remuneration" value="800" min="0" max="9999" required placeholder="Ex : 800">
                    </div>
                    <div class="form-group">
                        <label for="date_publication">Date de l'offre <span style="color: #ef4444;">*</span></label>
                        <input type="date" class="form-control" id="date_publication" name="date_publication" value="2025-03-10" required>
                    </div>
                </div>
                <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.5rem;">
                    <button type="submit" class="btn"><i class="fas fa-save"></i> Enregistrer</button>
                    <a href="../offers.html" class="btn btn-outline"><i class="fas fa-times"></i> Annuler</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 StageLab - Tous droits réservés - <a href="../mentions.html">Mentions légales</a></p>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('offerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const titre = document.getElementById('titre').value.trim();
            const entreprise = document.getElementById('entreprise').value;
            const description = document.getElementById('description').value.trim();
            const competences = document.getElementById('competences').value.trim();
            const remuneration = document.getElementById('remuneration').value;
            const date = document.getElementById('date_publication').value;

            if (!titre || !entreprise || !description || !competences || !remuneration || !date) {
                alert('Veuillez remplir tous les champs obligatoires.');
                return;
            }
            // envoi au backend
            alert('Offre enregistrée avec succès !');
            window.location.href = '../offers.html';
        });
    </script>
</body>
</html>
