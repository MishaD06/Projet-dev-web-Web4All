<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon profil - StageLab</title>
    <meta name="description" content="Modifiez vos informations personnelles sur StageLab.">
    <meta name="keywords" content="profil étudiant, informations personnelles, compte StageLab">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html">Stage<span>Lab</span></a>
            </div>
            <button class="burger" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" aria-label="Navigation principale">
                <ul>
                    <li><a href="dashboard-student.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="offers.html"><i class="fas fa-briefcase"></i> Offres</a></li>
                    <li><a href="companies.html"><i class="fas fa-building"></i> Entreprises</a></li>
                    <li><a href="wishlist.html"><i class="fas fa-heart"></i> Wishlist</a></li>
                    <li><a href="candidatures.html"><i class="fas fa-file-alt"></i> Candidatures</a></li>
                    <li><a href="profile.html" class="active"><i class="fas fa-user"></i> Profil</a></li>
                    <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div style="max-width: 600px; margin: 0 auto;">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-user-circle" style="color: #8b5cf6; margin-right: 0.5rem;"></i> Mon profil</h2>
                </div>
                <form id="profileForm" novalidate>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="nom">Nom <span style="color: #ef4444;">*</span></label>
                            <input type="text" class="form-control" id="nom" name="nom" value="Martin" required maxlength="50">
                        </div>
                        <div class="form-group">
                            <label for="prenom">Prénom <span style="color: #ef4444;">*</span></label>
                            <input type="text" class="form-control" id="prenom" name="prenom" value="Thomas" required maxlength="50">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email <span style="color: #ef4444;">*</span></label>
                        <input type="email" class="form-control" id="email" name="email" value="thomas.martin@cesi.fr" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Nouveau mot de passe</label>
                        <input type="password" class="form-control" id="password" name="mot_de_passe" placeholder="Laisser vide pour ne pas modifier" minlength="8" autocomplete="new-password">
                        <small style="color: #94a3b8; font-size: 0.8rem; margin-top: 0.3rem; display: block;">Minimum 8 caractères</small>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;"><i class="fas fa-save"></i> Enregistrer</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 StageLab - Tous droits réservés - <a href="mentions.html">Mentions légales</a></p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nom').value.trim();
            const prenom = document.getElementById('prenom').value.trim();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            if (!nom || !prenom || !email) { alert('Veuillez remplir les champs obligatoires.'); return; }
            if (pwd && pwd.length < 8) { alert('Le mot de passe doit comporter au moins 8 caractères.'); return; }
            alert('Profil mis à jour avec succès !');
        });
    </script>
</body>
</html>
